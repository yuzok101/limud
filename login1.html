<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>כניסה לאזור אישי</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin:0; padding:0; font-family: 'Assistant', sans-serif; }
        body { background: linear-gradient(135deg, #0d1b2a, #1b3b5a); color: #fff; display:flex; justify-content:center; align-items:center; min-height:100vh; overflow:hidden; }
        #loginCard, #personalArea { background: rgba(17,47,79,0.9); padding: 40px 30px; border-radius: 20px; box-shadow: 0 12px 40px rgba(0,0,0,0.5); width: 380px; text-align:center; }
        h2 { margin-bottom: 20px; }
        input { display: block; width: 100%; margin: 12px auto; padding: 14px 15px; border-radius: 12px; border: none; outline:none; font-size:16px; background: rgba(255,255,255,0.1); color: #fff; text-align: center; }
        input:focus { background: rgba(255,255,255,0.15); box-shadow: 0 0 8px #00bfff; }
        button { margin-top: 15px; width: 100%; padding: 12px; border:none; border-radius: 12px; background: #00bfff; color:#fff; font-weight:600; cursor:pointer; font-size:16px; transition: 0.3s; }
        button:hover { background: #0099cc; transform: translateY(-2px); }
        #message { color:#00bfff; font-size:14px; margin-bottom:10px; min-height:18px; }
        .spinner { border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid #fff; border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; display: none; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loginCard">
    <h2>כניסה לאזור אישי</h2>
    <form id="loginForm">
        <input type="text" id="idNumber" placeholder="תעודת זהות" required>
        <div id="message"></div>
        
        <input type="tel" id="phone" placeholder="מספר טלפון (או +972)" style="display:none;">
        <input type="tel" id="confirmPhone" placeholder="אימות טלפון" style="display:none;">
        
        <button type="submit" id="submitBtn">
            <span class="btnText">המשך</span>
            <div class="spinner"></div>
        </button>
    </form>
</div>

<div id="personalArea" style="display:none;">
    <h3>ברוך הבא, <span id="userName"></span></h3>
    <div id="userContent" style="margin-top:20px; text-align: right; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px;"></div>
    <button onclick="logout()" style="background:#ff4d4d; margin-top:20px;">התנתק</button>
</div>

<script>
    // === הכנס כאן את ה-URL שקיבלת מה-Deploy של ה-Apps Script ===
    const scriptURL = 'החלף_בכתובת_הסקריפט_שלך'; 

    let stage = 1;
    const messageDiv = document.getElementById('message');
    const phoneInput = document.getElementById('phone');
    const confirmInput = document.getElementById('confirmPhone');
    const btn = document.getElementById('submitBtn');
    const spinner = btn.querySelector('.spinner');
    const btnText = btn.querySelector('.btnText');

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('idNumber').value.trim();
        setLoading(true);

        try {
            if (stage === 1) {
                // שלב 1: בדיקת תעודת זהות
                let res = await fetch(scriptURL, { method:'POST', body: new URLSearchParams({ id, action: 'login' }) });
                let data = await res.json();
                
                if (data.success) {
                    if (data.needPhone) {
                        messageDiv.textContent = "אנא הזן טלפון פעמיים לרישום:";
                        confirmInput.style.display = 'block';
                    } else {
                        messageDiv.textContent = "אנא הזן טלפון לאימות:";
                    }
                    phoneInput.style.display = 'block';
                    stage = 2;
                } else {
                    messageDiv.textContent = data.message;
                }
            } 
            else if (stage === 2) {
                // שלב 2: אימות טלפון (כולל ניקוי קידומות)
                const clean = (val) => val.replace(/\D/g, "").slice(-9);
                const phoneVal = phoneInput.value.trim();
                const phoneCleaned = clean(phoneVal);
                
                if (phoneCleaned.length < 9) {
                    messageDiv.textContent = "מספר טלפון לא תקין";
                    setLoading(false);
                    return;
                }

                if (confirmInput.style.display !== 'none') {
                    if (phoneCleaned !== clean(confirmInput.value)) {
                        messageDiv.textContent = "מספרי הטלפון אינם תואמים";
                        setLoading(false);
                        return;
                    }
                }

                let res = await fetch(scriptURL, { 
                    method:'POST', 
                    body: new URLSearchParams({ id, phone: phoneVal, action: 'login' }) 
                });
                let data = await res.json();

                if (data.success) {
                    localStorage.setItem('loggedInUser', JSON.stringify(data));
                    showPersonalArea(data);
                } else {
                    messageDiv.textContent = data.message;
                }
            }
        } catch (err) {
            messageDiv.textContent = "שגיאת תקשורת";
        } finally {
            setLoading(false);
        }
    });

    function setLoading(isLoading) {
        spinner.style.display = isLoading ? 'block' : 'none';
        btnText.style.visibility = isLoading ? 'hidden' : 'visible';
        btn.disabled = isLoading;
    }

    function showPersonalArea(user) {
        document.getElementById('loginCard').style.display = 'none';
        document.getElementById('personalArea').style.display = 'block';
        document.getElementById('userName').textContent = user.firstName + " " + user.lastName;
        document.getElementById('userContent').innerHTML = `
            <p><b>טלפון במערכת:</b> ${user.phone}</p>
            <p><b>תאריך תוקף:</b> ${user.expiryDate || 'לא הוזן'}</p>
            <hr style="margin: 10px 0; opacity: 0.2;">
            <p>${user.personalArea || "אין מידע נוסף להצגה"}</p>
        `;
    }

    function logout() {
        localStorage.removeItem('loggedInUser');
        location.reload();
    }

    window.onload = () => {
        const savedUser = JSON.parse(localStorage.getItem('loggedInUser'));
        if (savedUser) showPersonalArea(savedUser);
    };
</script>

</body>
</html>
