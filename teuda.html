<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>תעודה</title>
    <style>
        body { 
            margin: 0; padding: 0; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; background-color: #f0f0f0; 
        }
        
        #certificate {
            position: relative;
            width: 800px; /* התאם לרוחב התמונה המקורי שלך */
        }

        .cert-img { width: 100%; display: block; }

        .text {
            position: absolute;
            font-family: 'Assistant', Arial, sans-serif;
            font-weight: bold;
            color: #0d1b2a;
            font-size: 22px;
        }

        /* כאן יש לכוון את המיקומים (top/right) לפי התמונה שלך.
           ערכים אלו הם דוגמה בלבד.
        */
        .name { top: 320px; right: 200px; }
        .id-number { top: 405px; right: 200px; }
        .course { top: 485px; right: 200px; }
        .hours { top: 565px; right: 200px; }
        .date { top: 600px; right: 200px; }

        @media print {
            button { display: none; }
            body { background: white; }
        }
    </style>
</head>
<body>

<div id="certificate">
    <img src="image.png" class="cert-img">
    
    <div class="text name" id="name"></div>
    <div class="text id-number" id="id"></div>
    <div class="text course" id="course"></div>
    <div class="text hours" id="hours"></div>
    <div class="text date" id="date"></div>
</div>

<br>
<button onclick="window.print()" style="padding:10px 20px; cursor:pointer;">הדפס/שמור כ-PDF</button>

<script>
    // שליפת הנתונים מה-LocalStorage
    const data = JSON.parse(localStorage.getItem('profileForTeuda'));
    
    if (data) {
        document.getElementById('name').innerText = data.firstName + ' ' + data.lastName;
        document.getElementById('id').innerText = data.id;
        document.getElementById('course').innerText = data.training;
        document.getElementById('date').innerText = data.courseEnd;

        // לוגיקת חישוב שעות לפי ההכשרה
        let training = data.training || "";
        let hoursText = "";

        if (training.includes("מע\"ר 44")) {
            hoursText = "44 שעות";
        } else if (training.includes("מע\"ר 60")) {
            hoursText = "60 שעות";
        } else if (training.includes("חובש") || training.includes("חובש רפואת חירום")) {
            hoursText = "227 שעות";
        } else {
            hoursText = "נתון חסר";
        }

        document.getElementById('hours').innerText = hoursText;
    } else {
        alert("לא נמצאו נתוני תעודה. אנא חזור לדף הפרטים.");
    }
</script>

</body>
</html>
