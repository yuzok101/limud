<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>התעודה שלי</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { 
            background: #0d1b2a; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; font-family: 'Assistant', sans-serif; margin: 0; padding: 20px; 
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .certificate-wrapper { 
            background: white; padding: 10px; border: 8px solid #ffd700; border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); animation: fadeIn 0.5s ease;
            position: relative; width: 800px; max-width: 95%;
        }

        .cert-img { width: 100%; display: block; }

        .text { 
            position: absolute; font-weight: 700; color: #0d1b2a; font-size: 22px; 
            pointer-events: none; /* שלא יפריע בלחיצה על התמונה */
        }

        /* כאן תבצע כיוונונים עדינים למיקומים בפיקסלים */
        .name { top: 320px; left: 200px; }
        .id-number { top: 405px; left: 200px; }
        .course { top: 485px; left: 200px; }
        .hours { top: 565px; left: 200px; }
        .date { top: 600px; left: 200px; }

        .btn-container { margin-top: 30px; display: flex; gap: 20px; }
        button { 
            padding: 15px 30px; border: none; border-radius: 50px; cursor: pointer; 
            font-size: 16px; font-weight: bold; transition: 0.3s; color: white;
        }
        .btn-pdf { background: #d32f2f; }
        .btn-png { background: #2e7d32; }
        button:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<div class="certificate-wrapper" id="capture">
    <img src="image.png" class="cert-img">
    <div class="text name" id="name"></div>
    <div class="text id-number" id="id"></div>
    <div class="text course" id="course"></div>
    <div class="text hours" id="hours"></div>
    <div class="text date" id="date"></div>
</div>

<div class="btn-container">
    <button class="btn-pdf" onclick="window.print()">הורד כ-PDF</button>
    <button class="btn-png" id="downloadPng">הורד כ-PNG</button>
</div>

<script>
    // טעינת הנתונים מה-LocalStorage
    const data = JSON.parse(localStorage.getItem('profileForTeuda'));
    
    if (data) {
        document.getElementById('name').innerText = (data.firstName || '') + ' ' + (data.lastName || '');
        document.getElementById('id').innerText = data.id || '';
        document.getElementById('course').innerText = data.training || '';
        document.getElementById('date').innerText = data.courseEnd || '';

        // חישוב שעות אוטומטי
        let training = (data.training || "").toString();
        let hoursText = "לפי מערכת";
        if (training.includes("מע\"ר 44")) hoursText = "44 שעות";
        else if (training.includes("מע\"ר 60")) hoursText = "60 שעות";
        else if (training.includes("חובש")) hoursText = "227 שעות";
        document.getElementById('hours').innerText = hoursText;
    } else {
        alert("לא נמצאו נתונים, אנא חזור לדף הפרופיל ונסה שנית.");
    }

    // לוגיקת הורדת PNG
    document.getElementById('downloadPng').addEventListener('click', () => {
        const captureElement = document.querySelector("#capture");
        html2canvas(captureElement, { scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'התעודה_שלי.png';
            link.href = canvas.toDataURL("image/png");
            link.click();
        });
    });
</script>

</body>
</html>
