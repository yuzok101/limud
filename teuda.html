<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>התעודה שלי - יוזוק מדיק</title>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&display=swap" rel="stylesheet">

<!-- ספרייה להמרת HTML ל-PDF/תמונה ישירות בדפדפן (לצורך שליחה עתידית למייל) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
  /* עיצוב כללי יוקרתי ואלגנטי */
  body {
    font-family: 'Assistant', sans-serif;
    margin: 0;
    padding: 0;
    background: radial-gradient(circle at top, #1a237e 0%, #0d1b2a 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    color: #fff;
    padding-bottom: 50px;
  }

  /* כותרת עליונה דקורטיבית */
  header {
    text-align: center;
    margin-top: 30px;
    margin-bottom: 20px;
  }

  header h1 {
    font-size: 28px;
    font-weight: 800;
    margin: 0 0 8px 0;
    letter-spacing: 1px;
    background: linear-gradient(45deg, #ffd700, #ffa500);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  header p {
    font-size: 16px;
    color: #e0e0e0;
    margin: 0;
  }

  /* כפתורי שליטה עליונים */
  .controls-top {
    display: flex;
    gap: 15px;
    margin-bottom: 25px;
    z-index: 10;
  }
  
  .btn {
    padding: 12px 24px;
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    font-family: 'Assistant', sans-serif;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }

  .btn-back {
    background-color: rgba(255, 255, 255, 0.1);
    color: #fff;
    border: 1px solid rgba(255, 255, 255, 0.2);
  }
  .btn-back:hover {
    background-color: rgba(255, 255, 255, 0.2);
    transform: translateY(-2px);
  }

  /* אזור כפתורים צפים (בצד שמאל וימין למטה) */
  .floating-actions {
    position: fixed;
    bottom: 30px;
    left: 30px;
    right: 30px;
    display: flex;
    justify-content: space-between;
    pointer-events: none; /* מאפשר ללחוץ על מה שמתחת לאזור הריק */
    z-index: 100;
  }

  .floating-btn {
    pointer-events: auto; /* מחזיר את יכולת הלחיצה לכפתורים עצמם */
    border: none;
    padding: 16px 28px;
    font-size: 16px;
    font-weight: 800;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
  }

  /* כפתור הורדה צף */
  .btn-download {
    background: linear-gradient(135deg, #ffd700 0%, #ffa500 100%);
    color: #0d1b2a;
    box-shadow: 0 10px 25px rgba(255, 215, 0, 0.3);
  }
  .btn-download:hover {
    transform: translateY(-5px) scale(1.03);
    box-shadow: 0 15px 30px rgba(255, 215, 0, 0.5);
  }

  /* כפתור שליחה למייל צף */
  .btn-email {
    background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
    color: #fff;
    box-shadow: 0 10px 25px rgba(0, 114, 255, 0.3);
  }
  .btn-email:hover {
    transform: translateY(-5px) scale(1.03);
    box-shadow: 0 15px 30px rgba(0, 114, 255, 0.5);
  }

  /* קונטיינר התעודה */
  .certificate-wrapper {
    background: rgba(255, 255, 255, 0.03);
    padding: 15px;
    border-radius: 24px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  }

  .certificate-container {
    position: relative;
    width: 210mm;
    height: 297mm;
    background-image: url('image.png');
    background-size: 100% 100%;
    background-position: center;
    background-repeat: no-repeat;
    box-sizing: border-box;
    border-radius: 12px;
    overflow: hidden;
  }

  /* מיקומים אבסולוטיים מדויקים על גבי התעודה */
  
  /* שם פרטי ומשפחה */
  .field-name {
    position: absolute;
    top: 35%;
    left: 10%;
    right: 10%;
    text-align: center;
    font-size: 34px;
    font-weight: 800;
    color: #1a237e;
  }

  /* מספר זהות */
  .field-id {
    position: absolute;
    top: 46%;
    left: 20%;
    right: 38%;
    text-align: left;
    font-size: 24px;
    font-weight: 600;
    color: #0d1b2a;
    direction: ltr;
  }

  /* שם הקורס/הכשרה */
  .field-training {
    position: absolute;
    top: 53.5%;
    left: 10%;
    right: 10%;
    text-align: center;
    font-size: 28px;
    font-weight: 700;
    color: #1a237e;
  }

  /* היקף שעות */
  .field-hours {
    position: absolute;
    top: 57.5%;
    left: 20%;
    right: 37%;
    text-align: left;
    font-size: 22px;
    font-weight: 600;
    color: #0d1b2a;
  }

  /* תאריך הנפקה */
  .field-date {
    position: absolute;
    top: 62.3%;
    left: 20%;
    right: 37%;
    text-align: left;
    font-size: 22px;
    font-weight: 600;
    color: #0d1b2a;
  }

  /* תצוגת הדפסה משופרת - מונעת דפים חלקים לחלוטין */
  @media print {
    html, body {
      background: #fff !important;
      color: #000 !important;
      width: 210mm;
      height: 297mm;
      margin: 0 !important;
      padding: 0 !important;
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }
    
    header, .controls-top, .floating-actions {
      display: none !important;
    }
    
    .certificate-wrapper {
      padding: 0 !important;
      border: none !important;
      box-shadow: none !important;
      background: transparent !important;
      margin: 0 !important;
      width: 210mm !important;
      height: 297mm !important;
    }
    
    .certificate-container {
      box-shadow: none !important;
      margin: 0 !important;
      width: 210mm !important;
      height: 297mm !important;
      border-radius: 0 !important;
      display: block !important;
      page-break-after: avoid !important;
      page-break-inside: avoid !important;
    }
    
    @page {
      size: A4 portrait;
      margin: 0 !important;
    }
  }
</style>
</head>
<body>

  <!-- כותרת האתר -->
  <header>
    <h1>פורטל התעודות הדיגיטלי</h1>
    <p>יוזוק מדיק - לדעת, להציל חיים</p>
  </header>

  <!-- כפתור חזרה עליון -->
  <div class="controls-top">
    <button class="btn btn-back" onclick="goBack()">
      <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16" style="transform: scaleX(-1);"><path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z"/></svg>
      חזרה לאזור האישי
    </button>
  </div>

  <!-- כפתורי פעולה צפים (תמיד זמינים על המסך) -->
  <div class="floating-actions">
    <!-- כפתור שליחה למייל -->
    <button class="floating-btn btn-email" onclick="sendToEmail()">
      <svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V4Zm2-1a1 1 0 0 0-1 1v.217l7 4.2 7-4.2V4a1 1 0 0 0-1-1H2Zm13 2.383-4.708 2.825L15 11.105V5.383Zm-.034 6.876-5.64-3.471L8 9.583l-1.326-.795-5.64 3.47A1 1 0 0 0 2 13h12a1 1 0 0 0 .966-.741ZM1 11.105l4.708-2.897L1 5.383v5.722Z"/></svg>
      שלח למייל שלי
    </button>

    <!-- כפתור שמירה והורדה -->
    <button class="floating-btn btn-download" onclick="downloadPDF()">
      <svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/><path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/></svg>
      הורד תעודה (PDF)
    </button>
  </div>

  <!-- תצוגת התעודה -->
  <div class="certificate-wrapper" id="printArea">
    <div class="certificate-container">
      <div class="field-name" id="certName">טוען שם...</div>
      <div class="field-id" id="certId">טוען ת.ז...</div>
      <div class="field-training" id="certTraining">טוען קורס...</div>
      <div class="field-hours" id="certHours">שעות</div>
      <div class="field-date" id="certDate">טוען תאריך...</div>
    </div>
  </div>

<script>
  const scriptURL = 'https://script.google.com/macros/s/AKfycbz8aZ1RIeeeCjMXHVjEpd4gFYl3xVzwdTwp1YSwT8Np0KxhtdY484uriBdj_XxDQvMe/exec';
  const profileData = JSON.parse(localStorage.getItem('profileForTeuda'));

  if (!profileData) {
    alert("לא נמצאו נתוני תעודה. אנא היכנס דרך דף הפרופיל.");
    window.location.href = "login1.html"; 
  } else {
    // מילוי הנתונים
    document.getElementById('certName').textContent = `${profileData.firstName} ${profileData.lastName}`;
    document.getElementById('certId').textContent = profileData.id;
    document.getElementById('certTraining').textContent = profileData.training;
    document.getElementById('certDate').textContent = profileData.courseEnd;

    // חישוב היקף השעות על פי התנאים שהגדרת
    const trainingText = (profileData.training || "").trim();
    let hoursValue = "";

    if (trainingText.includes('מע"ר 44')) {
      hoursValue = "44 שעות";
    } else if (trainingText.includes('מע"ר 60')) {
      hoursValue = "60 שעות";
    } else if (trainingText.includes('חובש')) {
      hoursValue = "207 שעות";
    } else {
      const matchedNumber = trainingText.match(/\d+/);
      if (matchedNumber) {
        hoursValue = matchedNumber[0] + " שעות";
      } else {
        hoursValue = "-- שעות";
      }
    }

    document.getElementById('certHours').textContent = hoursValue;
  }

  function downloadPDF() {
    window.print();
  }

  async function sendToEmail() {
    if (!profileData || !profileData.email) {
      alert("לא מוגדרת כתובת מייל עבור פרופיל זה במערכת.");
      return;
    }

    const confirmSend = confirm(`האם לשלוח את התעודה לכתובת המייל: ${profileData.email}?`);
    if (!confirmSend) return;

    // הצגת חיווי טעינה
    const originalBtnText = document.querySelector('.btn-email').innerHTML;
    document.querySelector('.btn-email').textContent = "מייצר PDF...";
    document.querySelector('.btn-email').style.opacity = "0.7";

    try {
      const element = document.getElementById('printArea');
      const opt = {
        margin:       0,
        filename:     `Teuda_${profileData.id}.pdf`,
        image:        { type: 'jpeg', quality: 0.95 },
        html2canvas:  { scale: 1.5, useCORS: true },
        jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
      };

      // יצירת ה-PDF בדפדפן כ-Base64
      const pdfBase64 = await html2pdf().set(opt).from(element).outputPdf('datauristring');
      const base64Data = pdfBase64.split(',')[1]; 

      document.querySelector('.btn-email').textContent = "שולח למייל...";

      // שימוש ב-URLSearchParams לשליחת הטופס בצורה אמינה ל-Google Web App
      const formData = new URLSearchParams();
      formData.append('action', 'sendCertificateEmail');
      formData.append('email', profileData.email.trim());
      formData.append('fullName', `${profileData.firstName} ${profileData.lastName}`);
      formData.append('pdfData', base64Data);
      formData.append('fileName', `Teuda_${profileData.id}.pdf`);

      const response = await fetch(scriptURL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: formData.toString()
      });

      const result = await response.json();

      if (result.success === true) {
        alert("התעודה נשלחה למייל שלך בהצלחה! ✉️ (בדוק גם בתיקיית הספאם)");
      } else {
        alert("שגיאה מהשרת: " + (result.message || "שגיאה לא ידועה"));
      }
    } catch (error) {
      console.error("Error sending email:", error);
      alert("שגיאה בתקשורת עם השרת: " + error.message);
    } finally {
      document.querySelector('.btn-email').innerHTML = originalBtnText;
      document.querySelector('.btn-email').style.opacity = "1";
    }
  }

  function goBack() {
    window.history.back();
  }
</script>

</body>
</html>
